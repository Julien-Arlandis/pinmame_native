<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PinMAME WASM - Responsive Board Analyzer</title>
    <style>
        :root {
            --bg-main: #050505;
            --bg-box: #111;
            --border-color: #252525;
            --neon-cyan: #00ffff;
            --neon-orange: #ff9900;
            --neon-red: #ff3300;
        }

        body { 
            background-color: var(--bg-main); 
            color: #fff; 
            font-family: monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px;
            box-sizing: border-box;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* 🌟 RETINA & MOBILE CANVAS SCALING */
        .canvas-container {
            width: 100%;
            max-width: 1150px;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        canvas { 
            background-color: #0a1111; 
            border: 3px solid #222; 
            border-radius: 8px; 
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.12); 
            image-rendering: pixelated; 
            width: 100%; /* S'adapte dynamiquement à la largeur du téléphone */
            height: auto; /* Conserve le ratio géométrique 1150x250 */
            display: block;
        }

        #status { 
            color: #ffcc00; 
            font-size: 1rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }
        
        /* Panneau Arcade Unifié */
        .arcade-panel { 
            display: flex; 
            gap: 20px; 
            width: 100%;
            max-width: 500px;
            justify-content: center;
            background: var(--bg-box); 
            padding: 12px; 
            border-radius: 10px; 
            border: 2px solid #222; 
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .btn { 
            flex: 1;
            padding: 14px 10px; 
            font-size: 0.9rem; 
            font-weight: bold; 
            font-family: monospace; 
            text-transform: uppercase; 
            border: none; 
            border-radius: 8px; 
            box-shadow: 0 4px #000; 
            transition: all 0.05s ease; 
            touch-action: none; 
            cursor: pointer;
        }
        .btn:active, .btn.forced-active { transform: translateY(3px); box-shadow: 0 1px #000; }
        .btn-coin { background-color: #ffcc00; color: #000; }
        .btn-start { background-color: #ff0044; color: #fff; }

        /* 🌟 ARCHITECTURE DES TABLEAUX DE BORD FLEXIBLE */
        .dashboard { 
            display: flex; 
            flex-direction: row; /* Côte à côte sur PC */
            gap: 15px; 
            max-width: 1150px; 
            width: 100%; 
            box-sizing: border-box;
        }
        .panel-box { 
            background: var(--bg-box); 
            border: 2px solid var(--border-color); 
            padding: 12px; 
            border-radius: 8px; 
            flex: 1; 
            box-sizing: border-box;
        }
        .box-title { color: var(--neon-cyan); text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px; letter-spacing: 1px; font-weight: bold;}
        .sub-title { color: #777; font-size: 0.7rem; margin: 8px 0 4px 0; font-weight: bold;}
        
        /* Grilles d'analyse */
        .grid-sw { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; touch-action: none; }
        .grid-lamp { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; }
        .grid-sol { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }

        .cell { 
            background: #141414; 
            border: 1px solid #222; 
            color: #444; 
            padding: 6px 1px; 
            font-size: 0.65rem; 
            font-weight: bold; 
            border-radius: 2px; 
            text-align: center; 
            touch-action: none; 
            cursor: default;
        }
        
        /* Micro-animations et néons */
        .cell.sw-user { background: #00ff44 !important; color: #000 !important; box-shadow: 0 0 6px #00ff44; border-color: #fff; }
        .cell.sw-cpu { background: var(--neon-orange) !important; color: #000 !important; font-weight: bold; }
        .cell.lamp-on { background: #ffff00 !important; color: #000 !important; box-shadow: 0 0 8px #ffff00; border-color: #fff; }
        .cell.sol-on { background: var(--neon-red) !important; color: #fff !important; box-shadow: 0 0 10px var(--neon-red); border-color: #fff; }

        /* 📱 COMPRESSIONS EXTRIEVES POUR MODE MOBILE (SMARTPHONES) */
        @media (max-width: 768px) {
            body { padding: 8px; }
            .dashboard { 
                flex-direction: column; /* On empile les boîtes verticalement sur smartphone */
                gap: 12px; 
            }
            .panel-box { padding: 10px; }
            
            /* Ajustement des colonnes pour éviter l'écrasement du texte */
            .grid-sw { grid-template-columns: repeat(8, 1fr); gap: 3px; }
            .grid-lamp { grid-template-columns: repeat(8, 1fr); gap: 3px; } /* Passe de 12 à 8 colonnes pour rester lisible */
            .grid-sol { grid-template-columns: repeat(4, 1fr); gap: 3px; }  /* Passe de 8 à 4 colonnes */
            
            .cell { 
                padding: 8px 1px; /* Boutons légèrement plus hauts pour faciliter le ciblage au doigt */
                font-size: 0.6rem; 
            }
        }
    </style>
</head>
<body>

    <div id="status">🟡 Initialisation du Moteur WebAssembly...</div>

    <div class="canvas-container">
        <canvas id="vfdCanvas" width="1150" height="250"></canvas>
    </div>

    <div class="arcade-panel">
        <button id="coinBtn" class="btn btn-coin">Coin 1 [5]</button>
        <button id="startBtn" class="btn btn-start">Start Game [1]</button>
    </div>

    <div class="dashboard">
        <div class="panel-box">
            <div class="box-title">🔌 Matrice Entrées (Switchs 00-79)</div>
            <div id="swGrid" class="grid-sw"></div>
        </div>

        <div class="panel-box">
            <div class="box-title">🎛️ Carte Driver MA-789</div>
            <div class="sub-title">💡 Transistors Lampes (Matrix) :</div>
            <div id="lampGrid" class="grid-lamp"></div>
            
            <div class="sub-title">⚡ Transistors Puissance Solénoïdes :</div>
            <div id="solGrid" class="grid-sol"></div>
        </div>
    </div>

    <script src="pinmame_web.js"></script>

    <script>
        const canvas = document.getElementById('vfdCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        const CHAR_WIDTH = 40; const CHAR_HEIGHT = 70; const SPACING = 15;
        let pinmameInstance = null;
        let vfdMemoryPointer = 0;

        const swCells = [];
        const lampCells = [];
        const solCells = [];

        const swGridEl = document.getElementById('swGrid');
        for (let i = 0; i < 80; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = String(i).padStart(2, '0');
            cell.addEventListener('pointerdown', (e) => { e.preventDefault(); injectSwitch(i, true); });
            cell.addEventListener('pointerup', (e) => { e.preventDefault(); injectSwitch(i, false); });
            cell.addEventListener('pointerleave', (e) => { e.preventDefault(); injectSwitch(i, false); });
            swGridEl.appendChild(cell);
            swCells.push(cell);
        }

        const lampGridEl = document.getElementById('lampGrid');
        for (let i = 0; i < 96; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = 'L' + String(i+1).padStart(2, '0');
            lampGridEl.appendChild(cell);
            lampCells.push(cell);
        }

        const solGridEl = document.getElementById('solGrid');
        for (let i = 0; i < 32; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = 'S' + String(i+1).padStart(2, '0');
            solGridEl.appendChild(cell);
            solCells.push(cell);
        }

        function injectSwitch(swId, isPressed) {
            if (!pinmameInstance || !vfdMemoryPointer) return;
            pinmameInstance.HEAPU8[vfdMemoryPointer + 100 + swId] = isPressed ? 1 : 0;
            if (isPressed) swCells[swId].classList.add('sw-user');
            else swCells[swId].classList.remove('sw-user');
        }

        async function startEmulation() {
            try {
                statusEl.textContent = "🟡 Chargement du binaire WebAssembly...";
                const instance = await createPinMAME({
                    print: function(text) { console.log(text); },
                    printErr: function(err) { console.error(err); },
                    locateFile: function(path, prefix) { return path.endsWith('.wasm') ? 'pinmame_web.wasm' : prefix + path; }
                });

                const response = await fetch('roms/bonebstr.zip');
                const romBuffer = await response.arrayBuffer();
                instance.FS.mkdir('/roms');
                instance.FS.writeFile('/roms/bonebstr.zip', new Uint8Array(romBuffer));

                pinmameInstance = instance;
                vfdMemoryPointer = instance._pinmame_get_dsprom_ptr();

                setupButtons();

                function renderFrame() {
                    const vfdData = new Uint16Array(pinmameInstance.HEAPU8.buffer, vfdMemoryPointer, 40);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < 20; i++) {
                        drawGottlieb14Segment(ctx, 30 + i * (CHAR_WIDTH + SPACING), 40, vfdData[i]);
                        drawGottlieb14Segment(ctx, 30 + i * (CHAR_WIDTH + SPACING), 140, vfdData[20 + i]);
                    }

                    for (let sw = 0; sw < 80; sw++) {
                        const byteIdx = Math.floor(sw / 8);
                        const bitIdx = sw % 8;
                        const isCpuActive = (pinmameInstance.HEAPU8[vfdMemoryPointer + 200 + byteIdx] & (1 << bitIdx)) !== 0;
                        if (isCpuActive) swCells[sw].classList.add('sw-cpu');
                        else swCells[sw].classList.remove('sw-cpu');
                    }

                    for (let col = 0; col < 12; col++) {
                        const colByte = pinmameInstance.HEAPU8[vfdMemoryPointer + 300 + col];
                        for (let row = 0; row < 8; row++) {
                            const lampId = (col * 8) + row;
                            const isLampOn = (colByte & (1 << row)) !== 0;
                            if (isLampOn) lampCells[lampId].classList.add('lamp-on');
                            else lampCells[lampId].classList.remove('lamp-on');
                        }
                    }

                    const solWord = new Uint32Array(pinmameInstance.HEAPU8.buffer, vfdMemoryPointer + 320, 1)[0];
                    for (let s = 0; s < 32; s++) {
                        const isSolOn = (solWord & (1 << s)) !== 0;
                        if (isSolOn) solCells[s].classList.add('sol-on');
                        else solCells[s].classList.remove('sol-on');
                    }

                    requestAnimationFrame(renderFrame);
                }

                requestAnimationFrame(renderFrame);
                statusEl.textContent = "🟢 Système d'analyse en ligne";
                instance._pinmame_web_boot();

            } catch (err) {
                statusEl.textContent = "🔴 ERREUR CRITIQUE : " + err.message;
            }
        }

        function setupButtons() {
            const coinBtn = document.getElementById('coinBtn');
            const startBtn = document.getElementById('startBtn');
            
            window.addEventListener('keydown', (e) => {
                if (e.key === '5') { injectSwitch(4, true); coinBtn.classList.add('forced-active'); }
                if (e.key === '1') { injectSwitch(3, true); startBtn.classList.add('forced-active'); }
            });
            window.addEventListener('keyup', (e) => {
                if (e.key === '5') { injectSwitch(4, false); coinBtn.classList.remove('forced-active'); }
                if (e.key === '1') { injectSwitch(3, false); startBtn.classList.remove('forced-active'); }
            });

            coinBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); injectSwitch(4, true); });
            coinBtn.addEventListener('pointerup', (e) => { e.preventDefault(); injectSwitch(4, false); });
            coinBtn.addEventListener('pointerleave', (e) => { e.preventDefault(); injectSwitch(4, false); });

            startBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); injectSwitch(3, true); });
            startBtn.addEventListener('pointerup', (e) => { e.preventDefault(); injectSwitch(3, false); });
            startBtn.addEventListener('pointerleave', (e) => { e.preventDefault(); injectSwitch(3, false); });
        }

        function drawGottlieb14Segment(ctx, x, y, mask) {
            ctx.save(); ctx.translate(x, y); ctx.transform(1, 0, -0.15, 1, 0, 0); 
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            const drawSeg = (bit, drawFn) => {
                if (mask & bit) { ctx.strokeStyle = '#00ffff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff'; }
                else { ctx.strokeStyle = '#122222'; ctx.shadowBlur = 0; }
                ctx.beginPath(); drawFn(); ctx.stroke();
            };
            const w = CHAR_WIDTH; const h = CHAR_HEIGHT; const m = h / 2; const hw = w / 2;
            drawSeg(0x0001, () => { ctx.moveTo(2, 0); ctx.lineTo(w - 2, 0); });               
            drawSeg(0x0002, () => { ctx.moveTo(w, 2); ctx.lineTo(w, m - 2); });               
            drawSeg(0x0004, () => { ctx.moveTo(w, m + 2); ctx.lineTo(w, h - 2); });           
            drawSeg(0x0008, () => { ctx.moveTo(2, h); ctx.lineTo(w - 2, h); });               
            drawSeg(0x0010, () => { ctx.moveTo(0, m + 2); ctx.lineTo(0, h - 2); });           
            drawSeg(0x0020, () => { ctx.moveTo(0, 2); ctx.lineTo(0, m - 2); });               
            drawSeg(0x0040, () => { ctx.moveTo(2, m); ctx.lineTo(hw - 2, m); });              
            drawSeg(0x0800, () => { ctx.moveTo(hw + 2, m); ctx.lineTo(w - 2, m); });          
            drawSeg(0x0100, () => { ctx.moveTo(2, 2); ctx.lineTo(hw - 2, m - 2); });          
            drawSeg(0x0200, () => { ctx.moveTo(hw, 2); ctx.lineTo(hw, m - 3); });             
            drawSeg(0x0400, () => { ctx.moveTo(w - 2, 2); ctx.lineTo(hw + 2, m - 2); });      
            drawSeg(0x4000, () => { ctx.moveTo(2, h - 2); ctx.lineTo(hw - 2, m + 2); });      
            drawSeg(0x1000, () => { ctx.moveTo(w - 2, h - 2); ctx.lineTo(hw + 2, m + 2); });  
            drawSeg(0x2000, () => { ctx.moveTo(hw, h - 4); ctx.lineTo(hw, m + 3); });         
            drawSeg(0x0080, () => { ctx.moveTo(w + 2, h); ctx.lineTo(w + 6, h + 8); });       
            drawSeg(0x8000, () => { ctx.arc(w + 4, h, 2, 0, Math.PI*2); });                   
            ctx.restore();
        }

        startEmulation();
    </script>
</body>
</html>
